version: "3.8"

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./bot.db:/app/bot.db
    restart: unless-stopped

  webhook:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./bot.db:/app/bot.db
    command: ["python", "run_webhook.py"]
    restart: unless-stopped
